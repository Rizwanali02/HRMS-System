services:
  hrms-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrms-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env.development  # variables from your .env file
    environment:
      - NODE_ENV=development 
    restart: always

volumes:
  mongodb_data:
